spring.application.name=EspritMarket
server.port=8088

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/esprit_market}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=20260325
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.task.scheduling.enabled=true
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://127.0.0.1:4200,http://127.0.0.1:4201
# JWT Configuration
# Secret key (BASE64 encoded) - Generate strong secret for production: echo -n "your-super-secret-key-minimum-256-bits-long" | base64
jwt.secret=${JWT_SECRET:}
# Access token expiration time in milliseconds (8 hours = 28800000 ms)
jwt.expiration=28800000
# Refresh token expiration time in milliseconds (7 days = 604800000 ms)
jwt.refresh-expiration=604800000

# Google Maps backend configuration
# Keep the API key outside source code and inject it via environment variable.
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
google.maps.base-url=https://maps.googleapis.com/maps/api

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.health.mail.enabled=false

# File upload
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:8MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:8MB}
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}
srv.upload-dir=${SRV_UPLOAD_DIR:/app/uploads/srv-images}
srv.deliverable.upload-dir=${SRV_DELIVERABLE_UPLOAD_DIR:/app/uploads/deliverables}
srv.booking.upload-dir=${SRV_BOOKING_UPLOAD_DIR:/app/uploads/bookings}
srv.deliverable.version-retention-days=${SRV_DELIVERABLE_VERSION_RETENTION_DAYS:30}

srv.pg-notify.enabled=${SRV_PG_NOTIFY_ENABLED:true}

# Gmail SMTP configuration for forgot password emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Password reset configuration
app.password-reset.code-expiration-minutes=10

# Courier scheduler: auto-refuse pending couriers after 5 days
courier.scheduler.pending-to-refused-cron=0 0 0 * * *
courier.scheduler.pending-to-refused-threshold=P5D

# Quiz scheduler: send interview reminder emails 5 minutes before the scheduled time
quiz.scheduler.interview-reminder-cron=0 * * * * *

# FastAPI Visual Search Microservice
app.ai.fastapi.url=http://127.0.0.1:8000/analyze

# Marketplace scheduler
app.marketplace.scheduler.nightly-cron=0 0 0 * * *
app.marketplace.scheduler.store-inactive-days=30

flask.url=http://localhost:5000

spring.mail.properties.mail.debug=false
app.event-notification.also-send-to=${EVENT_NOTIFICATION_EMAILS:}

# Stripe Payment Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.success-url=http://localhost:4200/payment-success
app.stripe.cancel-url=http://localhost:4200/payment-cancel
