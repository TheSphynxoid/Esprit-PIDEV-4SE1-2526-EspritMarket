<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 z-40 flex items-center justify-center p-4 animate-in fade-in">
  <div class="bg-white dark:bg-neutral-800 rounded-lg shadow-lg max-w-2xl w-full animate-in zoom-in-95 flex flex-col max-h-[90vh]">
    <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b border-neutral-200 dark:border-neutral-700 flex-shrink-0">
      <h2 class="text-lg font-bold text-primary dark:text-white">{{ title }}</h2>
      <button 
        (click)="onClose()"
        aria-label="Close dialog"
        class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 text-xl leading-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-colors"
      >
        &times;
      </button>
    </div>

    <!-- Content with Scroll -->
    <div class="p-6 overflow-y-auto flex-1">
      <ng-content></ng-content>
    </div>

    <!-- Footer -->
    <div class="flex gap-3 p-6 border-t border-neutral-200 dark:border-neutral-700 bg-neutral-50 dark:bg-neutral-700 rounded-b-lg flex-shrink-0">
      <button
        (click)="onClose()"
        class="flex-1 btn btn-secondary text-sm"
      >
        Cancel
      </button>
      <button
        (click)="onSubmit()"
        [disabled]="isSubmitting || isSubmitDisabled"
        class="flex-1 btn btn-primary text-sm disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isSubmitting ? 'Saving...' : submitLabel | titlecase }}
      </button>
    </div>
  </div>
</div>
