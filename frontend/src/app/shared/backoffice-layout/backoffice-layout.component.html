<div class="bo-layout dark:text-gray-100">
  <div *ngIf="sidebarOpen()" class="bo-overlay lg:hidden" (click)="closeSidebar()"></div>

  <aside [class.bo-sidebar-closed]="!sidebarOpen()" class="bo-sidebar">
    <div class="bo-sidebar-header">
      <div class="bo-logo">
        <img src="assets/logo.png" alt="ESPRIT" />
      </div>
      <div class="bo-brand">
        <span class="bo-brand-name">{{ title }}</span>
        <span class="bo-brand-user">{{ currentUser()?.name || 'User' }}</span>
      </div>
    </div>

    <nav class="bo-nav">
      <ul>
         <li *ngFor="let item of navItems">
           <button
             (click)="onTabClick(item.id)"
             class="bo-nav-item"
             [class.active]="activeTab === item.id"
           >
             <ng-container [ngSwitch]="item.icon">
               <svg *ngSwitchCase="'overview'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
               <svg *ngSwitchCase="'services'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
               <svg *ngSwitchCase="'projects'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
               <svg *ngSwitchCase="'scheduling'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
               <svg *ngSwitchCase="'bookings'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
               <svg *ngSwitchCase="'availability'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
               <svg *ngSwitchCase="'products'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
               <svg *ngSwitchCase="'orders'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
               <svg *ngSwitchCase="'sales'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
               <svg *ngSwitchCase="'offers'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
               <svg *ngSwitchCase="'vendor'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
               <svg *ngSwitchCase="'service-provider'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496.336c1.121.162 2.009-.726 1.847-1.847l-.336-2.496m-4.007 4.007l-2.496-.336c-1.121-.162-2.009.726-1.847 1.847l.336 2.496m0 0l-5.877 5.877M21 3L3 21"/></svg>
               <svg *ngSwitchCase="'recruiter'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
               <svg *ngSwitchCase="'deliverer'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/></svg>
               <svg *ngSwitchCase="'events'" xmlns="http://www.w3.org/2000/svg" class="bo-nav-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
               <span *ngSwitchDefault class="text-lg w-5 text-center">{{ item.icon }}</span>
             </ng-container>
             <span class="bo-nav-label">{{ item.label }}</span>
           </button>
         </li>
      </ul>
    </nav>

    <div class="bo-sidebar-footer">
      <button (click)="toggleTheme()" class="bo-footer-btn bo-theme-btn" [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <span>{{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
      </button>
      <button (click)="onLogout()" class="bo-footer-btn bo-logout-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="lg:hidden bo-mobile-header">
      <button (click)="toggleSidebar()" class="bo-hamburger" [attr.aria-label]="sidebarOpen() ? 'Close sidebar' : 'Open sidebar'">
        <svg *ngIf="!sidebarOpen()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg *ngIf="sidebarOpen()" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      <span class="bo-mobile-header-title">{{ title }}</span>
      <div class="bo-header-spacer"></div>
    </header>

     <main class="bo-main">
      <ng-content></ng-content>
    </main>
  </div>
</div>
