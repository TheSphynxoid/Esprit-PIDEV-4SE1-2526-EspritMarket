<form [formGroup]="form" class="space-y-4">

  <!-- Delivery Type -->
  <div>
    <label class="block text-sm font-semibold text-primary mb-2">Delivery Type</label>
    <select formControlName="deliverytype" class="w-full px-4 py-2 border rounded-lg">
      <option value="">-- Select --</option>
      <option value="STANDARD">STANDARD - Standard delivery (2–5 days)</option>
      <option value="EXPRESS">EXPRESS - Express delivery (24–48 hours)</option>
      <option value="SAME_DAY">SAME_DAY - Same-day delivery</option>
    </select>
    <div class="text-red-500 text-sm mt-1"
         *ngIf="f['deliverytype'].touched && f['deliverytype'].invalid">
      Delivery type is required
    </div>
  </div>

  <!-- Status -->
  <div>
    <label class="block text-sm font-semibold text-primary mb-2">Status</label>
    <select formControlName="status" class="w-full px-4 py-2 border rounded-lg">
      <option value="">-- Select --</option>
      <option value="Pending">Pending</option>
      <option value="In progress">In progress</option>
      <option value="Delivered">Delivered</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <div class="text-red-500 text-sm mt-1"
         *ngIf="f['status'].touched && f['status'].invalid">
      <div *ngIf="f['status'].errors?.['required']">Status is required</div>
      <div *ngIf="f['status'].errors?.['pattern']">Invalid status value</div>
    </div>
  </div>

  <div *ngIf="f['status'].value === 'Cancelled'">
    <label class="block text-sm font-semibold text-primary mb-2">Cancellation Reason</label>
    <textarea
      formControlName="cancellationReason"
      rows="3"
      placeholder="Provide cancellation reason"
      class="w-full px-4 py-2 border rounded-lg"
    ></textarea>
    <div class="text-red-500 text-sm mt-1"
         *ngIf="f['cancellationReason'].touched && f['cancellationReason'].invalid">
      <div *ngIf="f['cancellationReason'].errors?.['required']">Cancellation reason is required</div>
      <div *ngIf="f['cancellationReason'].errors?.['minlength']">Cancellation reason is too short</div>
    </div>
  </div>

  <!-- Delivery Date -->
   <div>
    <label class="block text-sm font-semibold mb-2">Delivery Date</label>
    <input type="date" formControlName="deliverydate"
           [min]="minDeliveryDate"
           [max]="maxDeliveryDate"
           class="w-full px-4 py-2 border rounded-lg"/>
    <div class="text-red-500 text-sm mt-1"
         *ngIf="f['deliverydate'].touched && f['deliverydate'].invalid">
      <div *ngIf="f['deliverydate'].errors?.['required']">
        Delivery date is required
      </div>
      <div *ngIf="f['deliverydate'].errors?.['minDate']">
        Date must be today or later
      </div>
      <div *ngIf="f['deliverydate'].errors?.['maxDate']">
        Date must be before end of this year
      </div>
    </div>
  </div>

  <!-- Address -->
  <div>
    <label class="block text-sm font-semibold text-primary mb-2">Delivery Address</label>
    <input type="text" formControlName="address" placeholder="Address will be auto-filled from order"
           class="w-full px-4 py-2 border rounded-lg"
           readonly />
    <div class="text-red-500 text-sm mt-1"
         *ngIf="f['address'].touched && f['address'].invalid">
      <div *ngIf="f['address'].errors?.['required']">
        Address is required
      </div>
    </div>
  </div>

  <!-- Order -->
  <div>
    <label class="block text-sm font-semibold text-primary mb-2">Order</label>
    <select formControlName="orderId" class="w-full px-4 py-2 border rounded-lg">
      <option [ngValue]="null">No order</option>
      <option *ngFor="let order of orders" [ngValue]="order.id">{{ order.label }}</option>
    </select>
  </div>

</form>
