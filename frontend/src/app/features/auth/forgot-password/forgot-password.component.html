<div class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-neutral-50 via-esprit-50 to-neutral-100 dark:from-neutral-900 dark:via-neutral-800 dark:to-neutral-900 transition-colors duration-200">
  <div class="w-full max-w-md animate-slide-up">
    <div class="card card-lg bg-white dark:bg-neutral-800 transition-colors duration-200">
      <h2 class="text-2xl font-bold text-center text-primary dark:text-white mb-2">Forgot password</h2>
      <p class="text-sm text-secondary dark:text-neutral-400 text-center mb-6">
        Enter your email and we will send a 5-digit code.
      </p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-primary dark:text-white mb-2">Email</label>
          <input
            type="email"
            placeholder="user@example.com"
            formControlName="email"
            class="form-input w-full"
          />
          @if (forgotForm.controls.email.invalid && forgotForm.controls.email.touched) {
            <div class="text-xs text-red-600 mt-1">Please enter a valid email.</div>
          }
        </div>

        @if (errorMessage()) {
          <div class="bg-red-50 border-l-4 border-red-600 p-3 rounded text-sm text-red-700">
            {{ errorMessage() }}
          </div>
        }

        @if (successMessage()) {
          <div class="bg-green-50 border-l-4 border-green-600 p-3 rounded text-sm text-green-700">
            {{ successMessage() }}
          </div>
        }

        <button
          type="submit"
          [disabled]="forgotForm.invalid || isLoading()"
          class="btn btn-primary w-full mt-2"
        >
          @if (!isLoading()) {
            <span>Send code</span>
          }
          @if (isLoading()) {
            <span>Sending...</span>
          }
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-secondary dark:text-neutral-400">
        <a routerLink="/login" class="text-esprit-red font-semibold hover:text-esprit-700">
          Back to login
        </a>
      </div>
    </div>
  </div>
</div>
