<div class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-neutral-50 via-esprit-50 to-neutral-100 dark:from-neutral-900 dark:via-neutral-800 dark:to-neutral-900 transition-colors duration-200">
  <div class="w-full max-w-md animate-slide-up">

    <!-- Logo Section -->
    <div class="text-center mb-8">
      <a routerLink="/home"
         class="inline-flex items-center gap-4 bg-white dark:bg-neutral-800 p-4 rounded-2xl shadow-card mb-4 border border-neutral-200 dark:border-neutral-700 transition-colors duration-200 hover:shadow-lg hover:opacity-90 cursor-pointer">
        
        <div class="w-16 h-16 rounded-full bg-white dark:bg-neutral-700 flex items-center justify-center shadow-md p-2">
          <img 
            src="assets/logo.png"
            alt="ESPRIT Logo"
            class="w-full h-full object-contain"
          />
        </div>

        <div class="text-left">
          <h1 class="text-2xl font-bold text-primary dark:text-white">ESPRIT Market</h1>
          <p class="text-sm text-secondary dark:text-neutral-400">Student Platform</p>
        </div>
      </a>
    </div>

    <!-- Dark Mode Toggle -->
    <div class="flex justify-end mb-2">
      <button (click)="themeService.toggleTheme()"
              class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg transition-colors duration-200"
              [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
        <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-neutral-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>

    <!-- Login Card -->
    <div class="card card-lg bg-white dark:bg-neutral-800 transition-colors duration-200">
      <h2 class="text-2xl font-bold text-center text-primary dark:text-white mb-6">Login</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-primary dark:text-white mb-2">Email</label>
          <input 
            type="email" 
            placeholder="student@esprit.tn"
            formControlName="email"
            class="form-input w-full"
          />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
               class="text-xs text-red-600 mt-1">
            Invalid email
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-primary dark:text-white mb-2">Password</label>
          <input 
            type="password" 
            placeholder="••••••••"
            formControlName="password"
            class="form-input w-full"
          />
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               class="text-xs text-red-600 mt-1">
            Minimum 6 characters
          </div>
          <div class="mt-2 text-right">
            <a routerLink="/forgot-password" class="text-xs font-semibold text-esprit-red hover:text-esprit-700">
              Forgot password?
            </a>
          </div>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage()" 
             class="bg-red-50 border-l-4 border-red-600 p-3 rounded text-sm text-red-700">
          ❌ {{ errorMessage() }}
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading()"
          class="btn btn-primary w-full mt-6 text-base font-semibold"
        >
          <span *ngIf="!isLoading()">Login</span>
          <span *ngIf="isLoading()">Logging in...</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-neutral-200 dark:border-neutral-700"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-3 bg-white dark:bg-neutral-800 text-secondary dark:text-neutral-400 font-medium">
            or
          </span>
        </div>
      </div>

      <!-- Register -->
      <p class="text-center text-sm text-secondary dark:text-neutral-400">
        Don't have an account yet? 
        <a routerLink="/register" class="text-esprit-red font-semibold hover:text-esprit-700">
          Sign up
        </a>
      </p>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-secondary dark:text-neutral-400 mt-8">
      © 2026 ESPRIT Market - Student Platform
    </p>

  </div>
</div>
