apiVersion: apps/v1
kind: Deployment
metadata:
  name: esprit-market-backend-dev
  namespace: esprit-market
  labels:
    app: esprit-market-backend-dev
    environment: dev
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8088"
    prometheus.io/path: "/actuator/prometheus"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esprit-market-backend-dev
  template:
    metadata:
      labels:
        app: esprit-market-backend-dev
    spec:
      containers:
        - name: backend
          image: thesphynx2000/espritmarket-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8088
          envFrom:
            - configMapRef:
                name: backend-config-dev
            - secretRef:
                name: backend-secret-dev
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: APP_UPLOAD_DIR
              value: "/app/uploads"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
      terminationGracePeriodSeconds: 30
