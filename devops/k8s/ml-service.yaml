apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: esprit-market
  labels:
    app: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml-service
        image: thesphynx2000/espritmarket-ml-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "500m"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: ML_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: SPRING_DATASOURCE_PASSWORD
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "sleep 10 && python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/retrain', data=b'')\" &"]
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: esprit-market
spec:
  selector:
    app: ml-service
  ports:
    - port: 8000
      targetPort: http
      name: http
